<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fafafa;
      color: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Background waves */
    .wave-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .wave-bg svg {
      width: 100%;
      height: 100%;
    }

    .page-wrap {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 40px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .nav-logo {
      font-size: 24px;
      font-weight: 800;
      color: #111;
      text-decoration: none;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .nav-link {
      color: #555;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.2s;
    }

    .nav-link:hover {
      color: #111;
    }

    .nav-link svg {
      width: 20px;
      height: 20px;
      vertical-align: middle;
    }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px 40px;
      animation: fadeInUp 0.8s ease-out;
    }

    .hero h1 {
      font-size: 80px;
      font-weight: 800;
      letter-spacing: -4px;
      color: #111;
      margin-bottom: 16px;
    }

    .hero p {
      font-size: 20px;
      color: #666;
      font-weight: 400;
    }

    .hero h1 span,
    .hero p span {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px);
      animation: letterIn 0.6s ease-out forwards;
    }

    .hero p span {
      transform: translateY(14px);
    }

    @keyframes letterIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cards */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      max-width: 800px;
      margin: 40px auto 60px;
      padding: 0 20px;
      width: 100%;
    }

    .card {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 32px;
      text-decoration: none;
      color: #111;
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      transform: translateY(40px);
      animation: cardIn 0.6s ease-out forwards;
    }

    .card:nth-child(2) {
      animation-delay: 0.15s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    @keyframes cardIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card-icon {
      width: 44px;
      height: 44px;
      background: #f3f3f3;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .card-icon svg {
      width: 22px;
      height: 22px;
      stroke: #111;
    }

    .card-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #999;
      margin-bottom: 8px;
    }

    .card-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .card-desc {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .card-price {
      margin-bottom: 20px;
    }

    .card-price-num {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .card-price-label {
      font-size: 14px;
      color: #888;
      margin-left: 4px;
    }

    .card-cta {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card-cta svg {
      width: 16px;
      height: 16px;
      transition: transform 0.2s;
    }

    .card:hover .card-cta svg {
      transform: translateX(4px);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 13px;
      margin-top: auto;
    }
  </style>
</head>
<body>

      <path d="M0 330 Q360 230 720 330 T1440 330" stroke="rgba(0,0,0,0.02)" stroke-width="1.2" fill="none"/>
      <path d="M0 590 Q360 490 720 590 T1440 590" stroke="rgba(0,0,0,0.02)" stroke-width="1.2" fill="none"/>
    </svg>
  </div>

  <div class="page-wrap">
    <nav class="nav">
      <a href="#" class="nav-logo">SXY</a>
      <div class="nav-links">
        <a href="#" class="nav-link">FAQ</a>
        <a href="#" class="nav-link">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        </a>
      </div>
    </nav>

    <section class="hero">
      <h1 id="title">SXY</h1>
      <p id="subtitle">Pick what you came for.</p>
    </section>

    <div class="grid">
      <a href="#" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="4 17 10 11 4 5"></polyline>
            <line x1="12" y1="19" x2="20" y2="19"></line>
          </svg>
        </div>
        <div class="card-label">Product 1</div>
        <div class="card-title">SXY Product</div>
        <div class="card-desc">The best tool available. Fast, stable, and built to last.</div>
        <div class="card-price">
          <span class="card-price-num">$15</span>
          <span class="card-price-label">lifetime</span>
        </div>
        <div class="card-cta">
          View Product
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <a href="#" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
          </svg>
        </div>
        <div class="card-label">Product 2</div>
        <div class="card-title">SXY Script</div>
        <div class="card-desc">Premium scripts for the top games. Redeemed instantly.</div>
        <div class="card-price">
          <span class="card-price-num">$10</span>
          <span class="card-price-label">lifetime</span>
        </div>
        <div class="card-cta">
          View Script
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>
    </div>

    <footer class="footer">© 2026 SXY</footer>
  </div>

  <script>
    function animateText(id, delay) {
      const el = document.getElementById(id);
      const text = el.textContent;
      el.innerHTML = '';
      [...text].forEach((char, i) => {
        const span = document.createElement('span');
        span.textContent = char === ' ' ? '\u00A0' : char;
        span.style.animationDelay = `${delay + i * 0.05}s`;
        el.appendChild(span);
      });
    }
    animateText('title', 0.1);
    animateText('subtitle', 0.5);
  </script>
</body>
</html>
