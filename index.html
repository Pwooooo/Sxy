<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY</title>
  <script src="theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    canvas#waves {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%;
    }

    .nav-logo {
      font-size: 24px; font-weight: 800; color: var(--text);
      text-decoration: none; letter-spacing: -1px;
      font-family: 'Arial Black', sans-serif;
    }

    .nav-links { display: flex; align-items: center; gap: 24px; }

    .nav-link {
      color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500;
      display: flex; align-items: center; gap: 6px; transition: color 0.2s, transform 0.2s;
    }
    .nav-link:hover { color: var(--text); transform: translateY(-2px); }
    .nav-link svg { width: 20px; height: 20px; }

    .hero {
      text-align: center; padding: 100px 20px 50px;
    }

    .hero h1 {
      font-size: 90px; font-weight: 900; letter-spacing: -5px; color: var(--text);
      margin-bottom: 16px; font-family: 'Arial Black', sans-serif;
    }

    .hero p { font-size: 22px; color: var(--text-secondary); font-weight: 400; }

    .hero h1 span, .hero p span {
      display: inline-block; opacity: 0; transform: translateY(40px);
      animation: letterIn 0.6s ease-out forwards;
    }
    .hero p span { transform: translateY(14px); }

    @keyframes letterIn { to { opacity: 1; transform: translateY(0); } }

    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 24px;
      max-width: 800px; margin: 20px auto 60px; padding: 0 20px; width: 100%;
    }

    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px;
      padding: 32px; text-decoration: none; color: var(--text);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0; transform: translateY(40px); animation: cardIn 0.6s ease-out forwards;
    }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.08); }

    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    .card-icon {
      width: 44px; height: 44px; background: var(--bg-input); border-radius: 12px;
      display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
    }
    .card-icon svg { width: 22px; height: 22px; stroke: var(--text); }

    .card-label {
      font-size: 12px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--text-muted); margin-bottom: 8px;
    }

    .card-title { font-size: 22px; font-weight: 700; margin-bottom: 10px; letter-spacing: -0.5px; }

    .card-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 24px; }

    .card-price { margin-bottom: 20px; }
    .card-price-num { font-size: 28px; font-weight: 800; letter-spacing: -1px; }
    .card-price-label { font-size: 14px; color: var(--text-secondary); margin-left: 4px; }

    .card-cta {
      font-size: 14px; font-weight: 600; color: var(--text);
      display: flex; align-items: center; gap: 6px;
    }
    .card-cta svg { width: 16px; height: 16px; transition: transform 0.2s; }
    .card:hover .card-cta svg { transform: translateX(4px); }

    .hero-btn {
      display: inline-block; padding: 14px 40px; background: var(--accent); color: var(--bg-card);
      border-radius: 10px; font-size: 15px; font-weight: 600; text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .hero-btn:hover { background: var(--accent-hover); transform: translateY(-3px); }
    .hero-btn:active { transform: scale(0.98); }

    .footer {
      text-align: center; padding: 40px 20px; color: var(--text-muted);
      font-size: 13px; margin-top: auto;
    }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <canvas id="waves"></canvas>

  <div class="page">
    <nav class="nav">

      <div class="nav-links">
        <a href="purchase.html" class="nav-link">Purchase</a>
        <a href="#" class="nav-link">FAQ</a>
        <a href="https://discord.gg/akjYjCf3yz" class="nav-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Discord
        </a>
      </div>
    </nav>

    <section class="hero">
      <h1 id="title">SXY</h1>
      <div style="margin-top: 40px;">
        <a id="heroBtn" href="signup.html" class="hero-btn">Get Started</a>
      </div>
    </section>



    <footer class="footer">© 2026 SXY</footer>
  </div>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function noise(x) {
      return Math.sin(x * 1.2) * 0.5 + Math.sin(x * 2.3) * 0.3 + Math.sin(x * 3.7) * 0.2;
    }

    function draw() {
      const cs = getComputedStyle(document.documentElement);
      const wc = cs.getPropertyValue('--wave-color').trim();
      ctx.clearRect(0, 0, w, h);
      const lines = 30;
      const spacing = h / lines;

      for (let i = 0; i < lines; i++) {
        ctx.beginPath();
        const yBase = i * spacing;
        const alpha = 0.15 + (Math.abs(i - lines / 2) / lines) * 0.2;
        ctx.strokeStyle = `rgba(${wc},${alpha})`;
        ctx.lineWidth = 1.2;

        for (let x = 0; x <= w; x += 3) {
          const xNorm = x / w;
          const wave1 = Math.sin(xNorm * 4 + time * 0.3 + i * 0.4) * 30;
          const wave2 = Math.sin(xNorm * 6 - time * 0.2 + i * 0.6) * 20;
          const wave3 = noise(xNorm * 3 + time * 0.1 + i * 0.3) * 25;
          const y = yBase + wave1 + wave2 + wave3;

          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
        ctx.stroke();
      }

      time += 0.008;
      requestAnimationFrame(draw);
    }
    draw();

    function animateText(id, delay) {
      const el = document.getElementById(id);
      const text = el.textContent;
      el.innerHTML = '';
      [...text].forEach((char, i) => {
        const span = document.createElement('span');
        span.textContent = char === ' ' ? '\u00A0' : char;
        span.style.animationDelay = `${delay + i * 0.05}s`;
        el.appendChild(span);
      });
    }
    animateText('title', 0.1);

    if (localStorage.getItem('sxy_token')) {
      document.getElementById('heroBtn').textContent = 'Dashboard';
      document.getElementById('heroBtn').href = 'dashboard.html';
    }
  </script>
</body>
</html>
