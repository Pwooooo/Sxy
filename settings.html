<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY — Settings</title>
  <script src="theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; overflow-x: hidden; }
    canvas#waves { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .nav-logo { font-size: 24px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -1px; font-family: 'Arial Black', sans-serif; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s, transform 0.2s; }
    .nav-link:hover { color: var(--text); transform: translateY(-2px); }
    .nav-link svg { width: 20px; height: 20px; }

    .settings { max-width: 600px; margin: 40px auto; padding: 0 20px; width: 100%; }
    .settings-header { margin-bottom: 40px; animation: fadeIn 0.5s ease-out; }
    .settings-title { font-size: 32px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 4px; }
    .settings-sub { font-size: 14px; color: var(--text-secondary); }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .section { margin-bottom: 32px; animation: fadeIn 0.5s ease-out both; }
    .section:nth-child(2) { animation-delay: 0.05s; }
    .section:nth-child(3) { animation-delay: 0.1s; }
    .section:nth-child(4) { animation-delay: 0.15s; }
    .section:nth-child(5) { animation-delay: 0.2s; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }

    .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .card-row { padding: 20px 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-light); }
    .card-row:last-child { border-bottom: none; }
    .card-label { font-size: 14px; font-weight: 600; }
    .card-value { font-size: 14px; color: var(--text-secondary); font-family: 'SF Mono', Monaco, monospace; }
    .card-value.green { color: #22c55e; font-weight: 600; }

    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.98); }
    .btn-danger { background: var(--btn-danger-bg); color: var(--error); border: 1px solid var(--btn-danger-border); }
    .btn-danger:hover { background: var(--btn-danger-hover); }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-outline:hover { background: var(--btn-outline-hover-bg); border-color: var(--text-muted); }

    .footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; margin-top: auto; }

    .theme-btn { flex: 1; padding: 10px; background: transparent; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: border-color 0.2s, transform 0.2s; text-align: center; }
    .theme-btn:hover { transform: translateY(-2px); }
    .theme-btn.active { border-color: var(--accent); }
    .theme-btn span { display: block; margin-top: 6px; font-size: 12px; font-weight: 600; color: var(--text-secondary); }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <canvas id="waves"></canvas>
  <div class="page">
    <nav class="nav">
      <a href="index.html" class="nav-logo">SXY</a>
      <div class="nav-links">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="purchase.html" class="nav-link">Purchase</a>
        <a href="https://discord.gg/akjYjCf3yz" class="nav-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Discord
        </a>
      </div>
    </nav>

    <div class="settings">
      <div class="settings-header">
        <div class="settings-title">Settings</div>
        <div class="settings-sub">Manage your account settings</div>
      </div>

      <div class="section">
        <div class="section-title">Account</div>
        <div class="card">
          <div class="card-row">
            <div class="card-label">Username</div>
            <div class="card-value" id="sUsername">—</div>
          </div>
          <div class="card-row">
            <div class="card-label">Email</div>
            <div class="card-value" id="sEmail">—</div>
          </div>
          <div class="card-row">
            <div class="card-label">Plan</div>
            <div class="card-value" id="sPlan">—</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">License</div>
        <div class="card">
          <div class="card-row">
            <div class="card-label">License Key</div>
            <div class="card-value" id="sKey">—</div>
          </div>
          <div class="card-row">
            <div class="card-label">Roblox Account</div>
            <div class="card-value" id="sRoblox">—</div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Appearance</div>
        <div class="card">
          <div class="card-row" style="flex-direction: column; align-items: stretch; gap: 12px;">
            <div class="card-label">Theme</div>
            <div style="display: flex; gap: 10px;">
              <button class="theme-btn" data-theme-choice="light" onclick="setTheme('light')">
                <div style="width:100%;height:40px;background:#fafafa;border:1px solid #e5e5e5;border-radius:8px;"></div>
                <span>Light</span>
              </button>
              <button class="theme-btn" data-theme-choice="dark" onclick="setTheme('dark')">
                <div style="width:100%;height:40px;background:#111;border:1px solid #2a2a2a;border-radius:8px;"></div>
                <span>Dark</span>
              </button>
              <button class="theme-btn" data-theme-choice="midnight" onclick="setTheme('midnight')">
                <div style="width:100%;height:40px;background:#0a0a1a;border:1px solid #1e1e3a;border-radius:8px;"></div>
                <span>Midnight</span>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Session</div>
        <div class="card">
          <div class="card-row">
            <div class="card-label">Log out of your account</div>
            <button class="btn btn-danger" onclick="doLogout()">Log Out</button>
          </div>
        </div>
      </div>
    </div>

    <footer class="footer">© 2026 SXY</footer>
  </div>

  <script>
    if (!localStorage.getItem('sxy_token')) {
      window.location.href = 'login.html';
    }

    const user = localStorage.getItem('sxy_user');
    const email = localStorage.getItem('sxy_email');
    const plan = localStorage.getItem('sxy_plan');
    const key = localStorage.getItem('sxy_license');
    const roblox = localStorage.getItem('sxy_roblox_user');

    if (user) document.getElementById('sUsername').textContent = user;
    if (email) document.getElementById('sEmail').textContent = email;
    if (plan) document.getElementById('sPlan').textContent = plan === 'basic' ? 'Basic' : 'Premium';
    if (key) document.getElementById('sKey').textContent = key;
    if (roblox) document.getElementById('sRoblox').textContent = roblox;

    function setTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('sxy_theme', theme);
      document.querySelectorAll('.theme-btn').forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-theme-choice') === theme);
      });
    }

    const currentTheme = localStorage.getItem('sxy_theme') || 'light';
    document.querySelectorAll('.theme-btn').forEach(btn => {
      btn.classList.toggle('active', btn.getAttribute('data-theme-choice') === currentTheme);
    });

    function doLogout() {
      localStorage.removeItem('sxy_token');
      localStorage.removeItem('sxy_user');
      localStorage.removeItem('sxy_email');
      localStorage.removeItem('sxy_plan');
      localStorage.removeItem('sxy_license');
      localStorage.removeItem('sxy_roblox_user');
      localStorage.removeItem('sxy_license');
      localStorage.removeItem('sxy_email');
      window.location.href = 'index.html';
    }
  </script>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function noise(x) { return Math.sin(x*1.2)*0.5 + Math.sin(x*2.3)*0.3 + Math.sin(x*3.7)*0.2; }
    function draw() {
      const cs = getComputedStyle(document.documentElement);
      const wc = cs.getPropertyValue('--wave-color').trim();
      ctx.clearRect(0, 0, w, h);
      const lines = 30, spacing = h / lines;
      for (let i = 0; i < lines; i++) {
        ctx.beginPath();
        const yBase = i * spacing;
        const alpha = 0.15 + (Math.abs(i - lines/2)/lines)*0.2;
        ctx.strokeStyle = `rgba(${wc},${alpha})`; ctx.lineWidth = 1.2;
        for (let x = 0; x <= w; x += 3) {
          const xN = x/w;
          const y = yBase + Math.sin(xN*4+time*0.3+i*0.4)*30 + Math.sin(xN*6-time*0.2+i*0.6)*20 + noise(xN*3+time*0.1+i*0.3)*25;
          if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      time += 0.008; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
