<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY — Log In</title>
  <script src="theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root, [data-theme="light"] {
      --bg: #fafafa;
      --bg-card: #ffffff;
      --bg-input: #fafafa;
      --text: #111111;
      --text-secondary: #888888;
      --text-muted: #999999;
      --border: #e5e5e5;
      --border-light: #f0f0f0;
      --border-focus: #111111;
      --accent: #111111;
      --accent-hover: #333333;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 0,0,0;
    }

    [data-theme="dark"] {
      --bg: #111111;
      --bg-card: #1a1a1a;
      --bg-input: #222222;
      --text: #e5e5e5;
      --text-secondary: #999999;
      --text-muted: #666666;
      --border: #2a2a2a;
      --border-light: #222222;
      --border-focus: #e5e5e5;
      --accent: #e5e5e5;
      --accent-hover: #cccccc;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 255,255,255;
    }

    [data-theme="midnight"] {
      --bg: #0a0a1a;
      --bg-card: #12122a;
      --bg-input: #1a1a35;
      --text: #e0e0f0;
      --text-secondary: #8888bb;
      --text-muted: #555580;
      --border: #1e1e3a;
      --border-light: #16162e;
      --border-focus: #6666cc;
      --accent: #7777ff;
      --accent-hover: #9999ff;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 100,100,200;
    }

    [data-theme="sakura"] {
      --bg: #fff5f7;
      --bg-card: #ffffff;
      --bg-input: #fff0f3;
      --text: #2d1b2e;
      --text-secondary: #8a6070;
      --text-muted: #b8909e;
      --border: #f0d4de;
      --border-light: #f8e8ee;
      --border-focus: #e8729a;
      --accent: #e8729a;
      --accent-hover: #d45580;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 232,114,154;
      --sakura-accent: #e8729a;
    }

    [data-theme="nature"] {
      --bg: #f4f7f2;
      --bg-card: #ffffff;
      --bg-input: #f0f4ee;
      --text: #1a2e1a;
      --text-secondary: #5a7a5a;
      --text-muted: #8aaa8a;
      --border: #d4e4d0;
      --border-light: #e8f0e5;
      --border-focus: #3a8a3a;
      --accent: #2d7a2d;
      --accent-hover: #1e5e1e;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 45,122,45;
    }

    [data-theme="ocean"] {
      --bg: #f0f7fa;
      --bg-card: #ffffff;
      --bg-input: #eaf4f8;
      --text: #0c2d3e;
      --text-secondary: #4a7a8a;
      --text-muted: #7aa8b8;
      --border: #c4dde8;
      --border-light: #dceef5;
      --border-focus: #1a8aaa;
      --accent: #0e7490;
      --accent-hover: #095a6e;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 14,116,144;
    }

    [data-theme="lavender"] {
      --bg: #f5f0fa;
      --bg-card: #ffffff;
      --bg-input: #f0eaf6;
      --text: #2a1a3e;
      --text-secondary: #7a6090;
      --text-muted: #a890b8;
      --border: #ddd0ee;
      --border-light: #ece4f5;
      --border-focus: #8a55cc;
      --accent: #7c3aed;
      --accent-hover: #6525c0;
      --success: #22c55e;
      --error: #ef4444;
      --wave-color: 124,58,237;
    }

    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    canvas#waves { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .nav-logo { font-size: 24px; font-weight: 800; color: var(--text); text-decoration: none; letter-spacing: -1px; font-family: 'Arial Black', sans-serif; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s, transform 0.2s; }
    .nav-link:hover { color: var(--text); transform: translateY(-2px); }
    .nav-link svg { width: 20px; height: 20px; }

    .auth-container { max-width: 400px; margin: 60px auto; padding: 0 20px; width: 100%; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .auth-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 40px; }
    .auth-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
    .auth-subtitle { font-size: 14px; color: var(--text-secondary); margin-bottom: 32px; text-align: center; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; background: var(--bg-input); }
    .form-input:focus { border-color: var(--border-focus); }
    .form-input::placeholder { color: #bbb; }

    .btn-primary { width: 100%; padding: 12px; background: var(--accent); color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.2s; margin-top: 8px; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-2px); }
    .btn-primary:active { transform: scale(0.98); }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--text-secondary); }
    .auth-footer a { color: var(--text); text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 12px; color: #bbb; font-weight: 500; }

    .btn-discord { width: 100%; padding: 12px; background: #5865F2; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s, transform 0.1s; }
    .btn-discord:hover { background: #4752C4; }
    .btn-discord:active { transform: scale(0.98); }
    .btn-discord svg { width: 20px; height: 20px; }

    .btn-google {
      width: 100%; padding: 12px; background: var(--bg-card); color: var(--text); border: 1px solid var(--border);
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.2s, transform 0.2s; margin-top: 10px;
    }
    .btn-google:hover { border-color: var(--text-muted); transform: translateY(-2px); }
    .btn-google:active { transform: scale(0.98); }

    .footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; margin-top: auto; }
  </style>
  <link rel="stylesheet" href="theme.css">
</head>
<body>
  <canvas id="waves"></canvas>
  <div class="page">
    <nav class="nav">
      <a href="index.html" class="nav-logo">SXY</a>
      <div class="nav-links">
        <a href="purchase.html" class="nav-link">Purchase</a>
        <a href="signup.html" class="nav-link">Sign Up</a>
        <a href="#" class="nav-link">FAQ</a>
        <a href="https://discord.gg/akjYjCf3yz" class="nav-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Discord
        </a>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Log in to your account</div>

        <button class="btn-discord" onclick="window.open('https://discord.gg/akjYjCf3yz','_blank')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>

          Continue with Google
        </button>

        <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password">
        </div>
        <div id="loginError" style="color:#ef4444; font-size:13px; margin-bottom:12px; display:none;"></div>
        <button class="btn-primary" id="loginBtn" onclick="doLogin()">Log In</button>

        <div class="auth-footer">

        </div>

    </div>

    <footer class="footer">© 2026 SXY</footer>
  </div>

  <script>
    if (localStorage.getItem('sxy_token')) {
      window.location.href = 'dashboard.html';
    }

    async function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please fill in all fields';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Logging in...';

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.error || 'Login failed';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Log In';
          return;
        }

        localStorage.setItem('sxy_token', data.token);
        localStorage.setItem('sxy_user', data.user.username);
        localStorage.setItem('sxy_email', data.user.email);
        if (data.user.plan) localStorage.setItem('sxy_plan', data.user.plan);
        if (data.user.licenseKey) localStorage.setItem('sxy_license', data.user.licenseKey);
        window.location.href = 'dashboard.html';
      } catch (e) {
        errEl.textContent = 'Network error — try again';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Log In';
      }
    }
  </script>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function noise(x) { return Math.sin(x*1.2)*0.5 + Math.sin(x*2.3)*0.3 + Math.sin(x*3.7)*0.2; }
    function draw() {
      const cs = getComputedStyle(document.documentElement);
      const wc = cs.getPropertyValue('--wave-color').trim();
      ctx.clearRect(0, 0, w, h);
      const lines = 30, spacing = h / lines;
      for (let i = 0; i < lines; i++) {
        ctx.beginPath();
        const yBase = i * spacing;
        const alpha = 0.15 + (Math.abs(i - lines/2)/lines)*0.2;
        ctx.strokeStyle = `rgba(${wc},${alpha})`; ctx.lineWidth = 1.2;
        for (let x = 0; x <= w; x += 3) {
          const xN = x/w;
          const y = yBase + Math.sin(xN*4+time*0.3+i*0.4)*30 + Math.sin(xN*6-time*0.2+i*0.6)*20 + noise(xN*3+time*0.1+i*0.3)*25;
          if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      time += 0.008; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
