<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY — Log In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #fafafa; color: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh; overflow-x: hidden;
    }
    canvas#waves { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .page { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .nav { display: flex; align-items: center; justify-content: space-between; padding: 20px 40px; max-width: 1200px; margin: 0 auto; width: 100%; }
    .nav-logo { font-size: 24px; font-weight: 800; color: #111; text-decoration: none; letter-spacing: -1px; font-family: 'Arial Black', sans-serif; }
    .nav-links { display: flex; align-items: center; gap: 24px; }
    .nav-link { color: #555; text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .nav-link:hover { color: #111; }
    .nav-link svg { width: 20px; height: 20px; }

    .auth-container { max-width: 400px; margin: 60px auto; padding: 0 20px; width: 100%; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .auth-box { background: #fff; border: 1px solid #e5e5e5; border-radius: 16px; padding: 40px; }
    .auth-title { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; text-align: center; }
    .auth-subtitle { font-size: 14px; color: #888; margin-bottom: 32px; text-align: center; }

    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    .form-input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; transition: border-color 0.2s; background: #fafafa; }
    .form-input:focus { border-color: #111; }
    .form-input::placeholder { color: #bbb; }

    .btn-primary { width: 100%; padding: 12px; background: #111; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; margin-top: 8px; }
    .btn-primary:hover { background: #333; }
    .btn-primary:active { transform: scale(0.98); }

    .auth-footer { text-align: center; margin-top: 24px; font-size: 13px; color: #888; }
    .auth-footer a { color: #111; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { text-decoration: underline; }

    .divider { display: flex; align-items: center; gap: 16px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: #e5e5e5; }
    .divider-text { font-size: 12px; color: #bbb; font-weight: 500; }

    .btn-discord { width: 100%; padding: 12px; background: #5865F2; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.2s, transform 0.1s; }
    .btn-discord:hover { background: #4752C4; }
    .btn-discord:active { transform: scale(0.98); }
    .btn-discord svg { width: 20px; height: 20px; }

    .btn-google {
      width: 100%; padding: 12px; background: #fff; color: #111; border: 1px solid #ddd;
      border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: border-color 0.2s, transform 0.1s; margin-top: 10px;
    }
    .btn-google:hover { border-color: #999; }
    .btn-google:active { transform: scale(0.98); }

    .footer { text-align: center; padding: 40px 20px; color: #999; font-size: 13px; margin-top: auto; }
  </style>
</head>
<body>
  <canvas id="waves"></canvas>
  <div class="page">
    <nav class="nav">
      <a href="index.html" class="nav-logo">SXY</a>
      <div class="nav-links">
        <a href="#" class="nav-link">FAQ</a>
        <a href="https://discord.gg/akjYjCf3yz" class="nav-link" target="_blank">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
          Discord
        </a>
      </div>
    </nav>

    <div class="auth-container">
      <div class="auth-box">
        <div class="auth-title">Welcome back</div>
        <div class="auth-subtitle">Log in to your account</div>

        <button class="btn-discord" onclick="window.open('https://discord.gg/akjYjCf3yz','_blank')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>

        </button>

        <button class="btn-google">
          <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Continue with Google
        </button>

        <div class="divider"><div class="divider-line"></div><div class="divider-text">or</div><div class="divider-line"></div></div>

        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" placeholder="you@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" placeholder="Enter your password">
        </div>
        <button class="btn-primary" onclick="window.location.href='dashboard.html'">Log In</button>

        <div class="auth-footer">
          Don't have an account? <a href="signup.html">Sign up</a>
        </div>
      </div>
    </div>

    <footer class="footer">© 2026 SXY</footer>
  </div>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function noise(x) { return Math.sin(x*1.2)*0.5 + Math.sin(x*2.3)*0.3 + Math.sin(x*3.7)*0.2; }
    function draw() {
      ctx.clearRect(0, 0, w, h);
      const lines = 30, spacing = h / lines;
      for (let i = 0; i < lines; i++) {
        ctx.beginPath();
        const yBase = i * spacing;
        const alpha = 0.15 + (Math.abs(i - lines/2)/lines)*0.2;
        ctx.strokeStyle = `rgba(0,0,0,${alpha})`; ctx.lineWidth = 1.2;
        for (let x = 0; x <= w; x += 3) {
          const xN = x/w;
          const y = yBase + Math.sin(xN*4+time*0.3+i*0.4)*30 + Math.sin(xN*6-time*0.2+i*0.6)*20 + noise(xN*3+time*0.1+i*0.3)*25;
          if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      time += 0.008; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
