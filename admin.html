<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SXY — Admin</title>
  <script src="theme.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root, [data-theme="light"] {
      --bg: #fafafa; --bg-card: #ffffff; --bg-input: #fafafa;
      --text: #111111; --text-secondary: #888; --text-muted: #999;
      --border: #e5e5e5; --accent: #a855f7; --accent-hover: #9333ea;
      --success: #22c55e; --error: #ef4444; --wave-color: 0,0,0;
    }
    [data-theme="dark"] {
      --bg: #111; --bg-card: #1a1a1a; --bg-input: #222;
      --text: #e5e5e5; --text-secondary: #999; --text-muted: #666;
      --border: #2a2a2a; --accent: #a855f7; --accent-hover: #9333ea;
      --success: #22c55e; --error: #ef4444; --wave-color: 255,255,255;
    }
    [data-theme="midnight"] {
      --bg: #0a0a1a; --bg-card: #12122a; --bg-input: #1a1a35;
      --text: #e0e0f0; --text-secondary: #8888bb; --text-muted: #555580;
      --border: #252550; --accent: #a78bfa; --accent-hover: #8b5cf6;
      --success: #34d399; --error: #f87171; --wave-color: 160,160,255;
    }
    [data-theme="sakura"] {
      --bg: #fff5f7; --bg-card: #ffffff; --bg-input: #fff8fa;
      --text: #4a3040; --text-secondary: #9a7088; --text-muted: #b898a8;
      --border: #f0c8d8; --accent: #e8789a; --accent-hover: #d65f80;
      --success: #50c878; --error: #e85050;       --wave-color: 220,140,170;
    }
    [data-theme="nature"] {
      --bg: #f4f7f2; --bg-card: #ffffff; --bg-input: #f0f4ee;
      --text: #1a2e1a; --text-secondary: #5a7a5a; --text-muted: #8aaa8a;
      --border: #d4e4d0; --accent: #2d7a2d; --accent-hover: #1e5e1e;
      --success: #50c878; --error: #e85050; --wave-color: 45,122,45;
    }
    [data-theme="ocean"] {
      --bg: #f0f7fa; --bg-card: #ffffff; --bg-input: #eaf4f8;
      --text: #0c2d3e; --text-secondary: #4a7a8a; --text-muted: #7aa8b8;
      --border: #c4dde8; --accent: #0e7490; --accent-hover: #095a6e;
      --success: #50c878; --error: #e85050; --wave-color: 14,116,144;
    }
    [data-theme="lavender"] {
      --bg: #f5f0fa; --bg-card: #ffffff; --bg-input: #f0eaf6;
      --text: #2a1a3e; --text-secondary: #7a6090; --text-muted: #a890b8;
      --border: #ddd0ee; --accent: #7c3aed; --accent-hover: #6525c0;
      --success: #50c878; --error: #e85050; --wave-color: 124,58,237;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }
    canvas#waves { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    .admin-container { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 20px; }

    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
    .admin-header h1 { font-size: 28px; font-weight: 700; }
    .admin-header h1 span { color: var(--accent); }
    .admin-badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-left: 8px; }

    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .stat-card .stat-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; color: var(--accent); }

    .section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 24px; }
    .section-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title i { color: var(--accent); }

    .user-table { width: 100%; border-collapse: collapse; }
    .user-table th { text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 8px 12px; border-bottom: 1px solid var(--border); }
    .user-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }
    .user-table tr:last-child td { border-bottom: none; }
    .user-table tr:hover td { background: var(--bg-input); }

    .user-email { color: var(--text); font-weight: 500; }
    .user-roblox { color: var(--accent); font-size: 12px; }
    .user-plan { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
    .user-plan.basic { background: rgba(168,85,247,0.15); color: var(--accent); }
    .user-plan.premium { background: rgba(234,179,8,0.15); color: #ca8a04; }
    .user-plan.none { background: var(--border); color: var(--text-muted); }

    .btn-danger { background: var(--error); color: #fff; border: none; padding: 4px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-danger:hover { opacity: 0.85; }

    .blocked-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .blocked-tag { background: rgba(239,68,68,0.1); color: var(--error); border: 1px solid rgba(239,68,68,0.3); padding: 4px 10px; border-radius: 6px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
    .blocked-tag button { background: none; border: none; color: var(--error); cursor: pointer; font-size: 14px; line-height: 1; }

    .loading { text-align: center; padding: 40px; color: var(--text-muted); }
    .error-msg { background: rgba(239,68,68,0.1); color: var(--error); padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <canvas id="waves"></canvas>
  <div class="admin-container">
    <div class="admin-header">
      <h1><span>SXY</span> Admin <span class="admin-badge">ADMIN</span></h1>
      <a href="dashboard.html" style="color:var(--text-secondary);text-decoration:none;font-size:13px;">← Back to Dashboard</a>
    </div>

    <div class="stats-grid" id="statsGrid">
      <div class="stat-card"><div class="stat-label">Total Users</div><div class="stat-value" id="statUsers">—</div></div>
      <div class="stat-card"><div class="stat-label">Basic Plans</div><div class="stat-value" id="statBasic">—</div></div>
      <div class="stat-card"><div class="stat-label">Premium Plans</div><div class="stat-value" id="statPremium">—</div></div>
      <div class="stat-card"><div class="stat-label">Blocked IDs</div><div class="stat-value" id="statBlocked">—</div></div>
    </div>

    <div class="section">
      <div class="section-title"><i class="fas fa-users"></i> Users</div>
      <div id="usersContent"><div class="loading">Loading...</div></div>
    </div>

    <div class="section">
      <div class="section-title"><i class="fas fa-ban"></i> Blocked Roblox IDs</div>
      <div id="blockedContent"><div class="loading">Loading...</div></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('sxy_token');
    if (!token) window.location.href = 'login.html';

    let allData = null;

    async function loadAdmin() {
      try {
        const res = await fetch('/api/admin-users', { headers: { 'Authorization': 'Bearer ' + token } });
        if (!res.ok) { document.getElementById('usersContent').innerHTML = '<div class="error-msg">Access denied. Admin only.</div>'; return; }
        allData = await res.json();
        renderStats();
        renderUsers();
        renderBlocked();
      } catch (e) {
        document.getElementById('usersContent').innerHTML = '<div class="error-msg">Failed to load data.</div>';
      }
    }

    function renderStats() {
      const users = allData.users || [];
      const basic = users.filter(u => u.plan === 'basic').length;
      const premium = users.filter(u => u.plan === 'premium').length;
      document.getElementById('statUsers').textContent = users.length;
      document.getElementById('statBasic').textContent = basic;
      document.getElementById('statPremium').textContent = premium;
      document.getElementById('statBlocked').textContent = (allData.robloxUsedIds || []).length;
    }

    function renderUsers() {
      const users = allData.users || [];
      if (users.length === 0) { document.getElementById('usersContent').innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No users yet.</div>'; return; }
      let html = '<table class="user-table"><thead><tr><th>Email</th><th>Roblox</th><th>Plan</th><th>Purchased</th><th></th></tr></thead><tbody>';
      for (const u of users) {
        const planClass = u.plan || 'none';
        const planLabel = u.plan ? u.plan.charAt(0).toUpperCase() + u.plan.slice(1) : 'None';
        const date = u.purchasedAt ? new Date(u.purchasedAt).toLocaleDateString() : '—';
        html += `<tr>
          <td class="user-email">${u.email || '—'}</td>
          <td class="user-roblox">${u.robloxUser || '—'} <span style="color:var(--text-muted)">(${u.robloxUserId || '—'})</span></td>
          <td><span class="user-plan ${planClass}">${planLabel}</span></td>
          <td style="color:var(--text-muted);font-size:12px;">${date}</td>
          <td><button class="btn-danger" onclick="deleteUser('${u.email}')">Delete</button></td>
        </tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('usersContent').innerHTML = html;
    }

    function renderBlocked() {
      const ids = allData.robloxUsedIds || [];
      if (ids.length === 0) { document.getElementById('blockedContent').innerHTML = '<div style="color:var(--text-muted);font-size:13px;">No blocked IDs.</div>'; return; }
      let html = '<div class="blocked-list">';
      for (const id of ids) {
        html += `<div class="blocked-tag">${id} <button onclick="unblockId('${id}')">&times;</button></div>`;
      }
      html += '</div>';
      document.getElementById('blockedContent').innerHTML = html;
    }

    async function deleteUser(email) {
      if (!confirm('Delete ' + email + '?')) return;
      await fetch('/api/admin-users', {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetEmail: email })
      });
      loadAdmin();
    }

    async function unblockId(id) {
      if (!confirm('Unblock Roblox ID ' + id + '?')) return;
      await fetch('/api/admin-users', {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetUserId: id })
      });
      loadAdmin();
    }

    loadAdmin();
  </script>

  <script>
    const canvas = document.getElementById('waves');
    const ctx = canvas.getContext('2d');
    let w, h, time = 0;
    function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
    window.addEventListener('resize', resize); resize();
    function noise(x) { return Math.sin(x*1.2)*0.5 + Math.sin(x*2.3)*0.3 + Math.sin(x*3.7)*0.2; }
    function draw() {
      const cs = getComputedStyle(document.documentElement);
      const wc = cs.getPropertyValue('--wave-color').trim();
      ctx.clearRect(0, 0, w, h);
      const lines = 30, spacing = h / lines;
      for (let i = 0; i < lines; i++) {
        ctx.beginPath();
        const yBase = i * spacing;
        const alpha = 0.15 + (Math.abs(i - lines/2)/lines)*0.2;
        ctx.strokeStyle = `rgba(${wc},${alpha})`; ctx.lineWidth = 1.2;
        for (let x = 0; x <= w; x += 3) {
          const xN = x/w;
          const y = yBase + Math.sin(xN*4+time*0.3+i*0.4)*30 + Math.sin(xN*6-time*0.2+i*0.6)*20 + noise(xN*3+time*0.1+i*0.3)*25;
          if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      time += 0.008; requestAnimationFrame(draw);
    }
    draw();
  </script>
</body>
</html>
